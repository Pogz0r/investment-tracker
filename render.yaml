databases:
  - name: bdc-portfolio-db
    databaseName: portfolio
    user: portfolio_user
    plan: free

services:
  - type: web
    name: bdc-investment-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --log-level debug app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bdc-portfolio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
