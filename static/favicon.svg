<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>
  <!-- Upward trending chart line -->
  <polyline
    points="4,24 10,18 16,20 22,11 28,6"
    fill="none"
    stroke="#00c853"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Dot at the peak -->
  <circle cx="28" cy="6" r="2" fill="#00c853"/>
  <!-- Baseline -->
  <line x1="4" y1="27" x2="28" y2="27" stroke="#2a3441" stroke-width="1.5" stroke-linecap="round"/>
</svg>
